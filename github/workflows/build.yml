name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code source
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Installe Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Génère le fichier debug.keystore manquant demandé par votre projet
      - name: Generate Dummy Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 4. Initialise proprement l'environnement Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. Lance la compilation
      - name: Build APK with Gradle
        run: gradle assembleDebug

      # 6. Sauvegarde l'APK pour le téléchargement
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: "app/build/outputs/apk/debug/*.apk"
